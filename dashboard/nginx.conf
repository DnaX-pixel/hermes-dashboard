server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Ensure JS (incl. ES modules) served as text/javascript so importmap works.
    types {
        text/html                             html htm;
        text/css                              css;
        text/javascript                       js mjs;
        application/json                      json;
        image/svg+xml                         svg svgz;
        font/woff2                            woff2;
    }
    default_type application/octet-stream;

    # Cache vendored libraries (Three.js, socket.io) - they don't change often.
    location /vendor/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST endpoints (e.g. /api/agents, /health) to the watcher service.
    # "watcher" resolves via Docker Compose's internal DNS (service name).
    location /api/ {
        proxy_pass http://watcher:4500/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://watcher:4500/health;
    }

    # Proxy Socket.io (WebSocket) traffic to the watcher service.
    # Upgrade headers are required for the WebSocket handshake to succeed.
    location /socket.io/ {
        proxy_pass http://watcher:4500/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400; # keep long-lived WS connections alive
    }
}
