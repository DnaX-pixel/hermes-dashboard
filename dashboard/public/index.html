<!doctype html>
<html class="h-full" lang="en">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Hermes Room — Spatial Agent Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tailwind.css" />
<style>
  body { background-color:#f8fafc; color:#1e293b; overflow:hidden; }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
  .active-tab { border-bottom:2px solid #3b82f6; color:#1e293b; }
  .overlay-label { position:absolute; pointer-events:none; z-index:10; font-size:11px; font-weight:600; color:#64748b; display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.7); padding:2px 6px; border-radius:6px; backdrop-filter:blur(2px); }
</style>
</head>
<body class="h-full flex flex-col font-sans">
<div class="flex flex-1 overflow-hidden">

  <!-- Icon rail -->
  <aside class="w-16 flex flex-col items-center py-4 bg-hr-sidebar border-r border-hr-border gap-6">
    <div class="p-2 bg-blue-50 rounded-lg text-blue-600 mb-4">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
    </div>
    <button class="p-2 text-hr-blue rounded-md hover:bg-slate-100" title="Explorer">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
      <span class="text-[10px] font-medium block mt-1 text-center">Explorer</span>
    </button>
    <button class="p-2 text-slate-400 hover:text-slate-600" title="Search">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
    </button>
    <button class="p-2 text-slate-400 hover:text-slate-600" title="Source Control">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
    </button>
    <button class="p-2 text-slate-400 hover:text-slate-600 mt-auto" title="Settings">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
    </button>
  </aside>

  <!-- Explorer file tree -->
  <aside class="w-60 bg-white border-r border-hr-border flex flex-col">
    <div class="p-4 flex justify-between items-center border-b border-hr-border">
      <h2 class="text-xs font-bold uppercase tracking-wider text-slate-500">Explorer</h2>
      <span class="text-slate-400">...</span>
    </div>
    <div class="flex-1 overflow-y-auto py-2 text-sm text-slate-600">
      <div class="px-2 py-1 flex items-center gap-2 font-semibold text-slate-900">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        HERMES-WORKSPACE
      </div>
      <div class="ml-4">
        <div class="px-2 py-1 flex items-center gap-2"><svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg><span>agents</span></div>
        <div class="ml-4 border-l border-slate-100" id="agent-tree"></div>
      </div>
      <div class="ml-4 mt-2">
        <div class="px-2 py-1 flex items-center gap-2 font-medium"><svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg><span>data sources</span></div>
        <div class="ml-4 border-l border-slate-100 text-xs text-slate-500">
          <div class="px-2 py-1 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-slate-300"></span>expenses.csv</div>
          <div class="px-2 py-1 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-slate-300"></span>sessions.json</div>
        </div>
      </div>
    </div>
    <div class="p-4 border-t border-hr-border bg-slate-50">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-500">H</div>
        <div class="flex-1">
          <div class="text-xs font-bold">Hermes Room</div>
          <div class="text-[10px] flex items-center gap-1" id="ws-status">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500" id="ws-dot"></span>
            <span id="ws-label" class="text-red-500">connecting…</span>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col relative overflow-hidden">
    <header class="h-14 border-b border-hr-border bg-white flex items-center justify-between px-6 z-10">
      <div class="text-sm font-semibold flex items-center gap-2">
        <span class="text-slate-400">Hermes</span><span class="text-slate-300">/</span>
        <span>Spatial Agent Monitor</span>
      </div>
      <div class="flex-1 max-w-xl mx-8 relative">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
          <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
        </div>
        <input class="block w-full bg-slate-100 border-none rounded-lg py-1.5 pl-10 pr-12 text-sm focus:ring-1 focus:ring-blue-500" placeholder="Type a command or search..." type="text" />
        <div class="absolute inset-y-0 right-3 flex items-center text-[10px] font-mono text-slate-400">⌘ K</div>
      </div>
      <div class="flex items-center gap-4 text-slate-400">
        <span class="font-mono text-xs" id="clock"></span>
      </div>
    </header>

    <!-- Visualization area -->
    <div class="flex-1 relative p-6 overflow-hidden flex flex-col">
      <div class="flex-1 relative rounded-xl shadow-inner border border-hr-border bg-slate-50 overflow-hidden" id="workspace-container">
        <div class="absolute inset-0 w-full h-full" id="room-3d"></div>

        <!-- System Overview -->
        <div class="absolute top-4 right-4 w-64 bg-white/90 backdrop-blur shadow-lg rounded-xl border border-white/20 p-4 z-20">
          <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-bold text-slate-500 uppercase">System Overview</span>
            <span class="text-slate-400">...</span>
          </div>
          <div class="h-32 bg-slate-50 rounded-lg flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#3b82f6 0.5px, transparent 0.5px); background-size: 10px 10px;"></div>
            <div class="relative w-24 h-24 border border-blue-100 rounded-full flex items-center justify-center">
              <div class="w-16 h-16 border border-blue-200 rounded-full flex items-center justify-center">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
              </div>
              <div id="overview-dots"></div>
            </div>
          </div>
          <div class="mt-4 flex items-center justify-between text-[10px] text-slate-500">
            <div class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span><span id="overview-count">0 agents active</span></div>
            <div class="flex items-center gap-2"><span>-</span> 100% <span>+</span></div>
          </div>
        </div>
      </div>

      <!-- Terminal -->
      <div class="h-64 mt-4 bg-white rounded-xl border border-hr-border shadow-sm flex flex-col">
        <div class="flex border-b border-hr-border px-4 items-center">
          <div class="flex text-[10px] font-bold uppercase tracking-wide gap-6">
            <button class="py-3 active-tab">Event Log</button>
            <button class="py-3 text-slate-400 hover:text-slate-600">Output</button>
            <button class="py-3 text-slate-400 hover:text-slate-600">Problems</button>
          </div>
          <div class="ml-auto flex items-center gap-2 text-xs font-medium text-slate-600" id="terminal-selected">
            <span class="w-2 h-2 rounded-full bg-slate-300"></span> all agents
          </div>
        </div>
        <div class="flex-1 flex overflow-hidden">
          <div class="flex-1 overflow-y-auto p-4 font-mono text-[11px] leading-relaxed" id="terminal-body"></div>
          <div class="w-72 border-l border-hr-border p-4 flex flex-col gap-3" id="task-panel">
            <div class="text-[10px] text-slate-400" id="task-empty">Select an agent to inspect</div>
            <div class="hidden flex-col gap-3" id="task-detail">
              <div class="flex justify-between text-xs"><span class="text-slate-400">Agent</span><span class="font-semibold" id="task-name">—</span></div>
              <div class="flex justify-between text-xs"><span class="text-slate-400">State</span><span class="font-mono" id="task-state">—</span></div>
              <div class="flex justify-between text-xs"><span class="text-slate-400">Activity</span><span class="font-mono text-right max-w-[140px] truncate" id="task-activity">—</span></div>
              <div class="flex justify-between text-xs"><span class="text-slate-400">Updated</span><span class="font-mono" id="task-updated">—</span></div>
              <div class="mt-2">
                <div class="flex justify-between text-[10px] text-slate-400 mb-1"><span>Activity level</span><span id="task-progress-label">0%</span></div>
                <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500 transition-all duration-500" id="task-progress" style="width:0%"></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="vendor/socketio/socket.io.min.js"></script>
<script type="importmap">
{ "imports": { "three": "./vendor/three/three.module.js", "three/addons/": "./vendor/three/addons/" } }
</script>
<script type="module">
  try {
    const THREE = await import("three");
    const { OrbitControls } = await import("three/addons/controls/OrbitControls.js");
    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    window.dispatchEvent(new Event("three-ready"));
  } catch (err) {
    console.error("Three.js failed to load:", err);
    const m = document.getElementById("room-3d");
    if (m) m.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:13px;padding:20px;text-align:center;">3D engine gagal dimuat.<br>Lihat Console (F12) untuk butiran.</div>';
  }
</script>
<script>
  // Safety net: if Three.js hasn't loaded after 6s, show a message instead of staying blank
  window.addEventListener("load", () => {
    setTimeout(() => {
      if (!window.THREE) {
        const m = document.getElementById("room-3d");
        if (m && !m.querySelector("canvas") && !m.innerHTML.trim()) {
          m.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:13px;padding:20px;text-align:center;">3D engine masih memuat atau gagal.<br>Periksa Console (F12).</div>';
        }
      }
    }, 6000);
  });
</script>
<script src="room3d.js"></script>
<script src="terminal.js"></script>
<script src="app.js"></script>
</body>
</html>
